version: '3.8'

services:
  fc-web:
    container_name: fc-web
    build:
      context: ./src/web
      dockerfile: Dockerfile
    volumes:
      - ./src/web:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    command: npm run dev
    depends_on:
      - fc-core
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5000

  fc-core:
    container_name: fc-core
    build:
      context: ./src/core
      dockerfile: Dockerfile
    volumes:
      - ./src/core:/app
      - /app/node_modules
    ports:
      - "5000:5000"
    command: npm run dev
    depends_on:
      fc-mongo:
        condition: service_healthy
    environment:
      - MONGODB_URI=mongodb://fc-mongo:27017/finance-control?replicaSet=rs0
      - JWT_SECRET=${JWT_SECRET:-supersecretdev}
      - PORT=5000
      - NODE_ENV=development

  fc-mongo:
    container_name: fc-mongo
    image: mongo:7.0
    command: ["--replSet", "rs0", "--bind_ip_all"]
    ports:
      - "27017:27017"
    volumes:
      - ./.docker/fc-mongo/data:/data/db
      - /etc/localtime:/etc/localtime:ro
    healthcheck:
      test: >-
        mongosh --quiet --eval
        "try{rs.status().ok}catch(e){rs.initiate({_id:'rs0',members:[{_id:0,host:'fc-mongo:27017'}]}).ok}"
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 10s
